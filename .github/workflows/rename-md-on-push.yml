name: Rename Markdown Files On Push

on:
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "**/*.md"

permissions:
  contents: write

jobs:
  rename-markdown-files:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rename markdown files with timestamp
        id: rename
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          timestamp="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          zero_sha='0000000000000000000000000000000000000000'
          changed=0

          declare -a files=()

          if [[ "${BEFORE_SHA}" == "${zero_sha}" ]]; then
            while IFS= read -r -d '' path; do
              files+=("${path}")
            done < <(git ls-tree -r -z --name-only HEAD -- ':(glob)*.md' ':(glob)**/*.md')
          else
            while IFS= read -r -d '' path; do
              files+=("${path}")
            done < <(git diff -z --name-only --diff-filter=AM "${BEFORE_SHA}" "${CURRENT_SHA}" -- ':(glob)*.md' ':(glob)**/*.md')
          fi

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          for path in "${files[@]}"; do
            [[ -f "${path}" ]] || continue

            dir="$(dirname "${path}")"
            base="$(basename "${path}")"

            if [[ "${base}" =~ ^[0-9]{8}-[0-9]{6}_ ]]; then
              continue
            fi

            stem="${base%.md}"
            target_dir="."
            if [[ "${dir}" != "." ]]; then
              target_dir="${dir}"
            fi

            candidate="${target_dir}/${timestamp}_${base}"
            suffix=2
            while [[ -e "${candidate}" ]]; do
              candidate="${target_dir}/${timestamp}_${stem}-${suffix}.md"
              suffix=$((suffix + 1))
            done

            mv "${path}" "${candidate}"
            changed=1
          done

          if [[ "${changed}" -eq 1 ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push renamed files
        if: steps.rename.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: add timestamps to markdown files"
          git push
