name: Refresh Markdown Archive Snapshots

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "**/*.md"

permissions:
  contents: write

jobs:
  refresh-markdown-archives:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      CN_MIRROR_PROVIDERS: ${{ vars.CN_MIRROR_PROVIDERS || 'pichub,superbed' }}
      PHOTOBED_ROOT: ${{ vars.PHOTOBED_ROOT || 'photobed' }}
      PICHUB_TOKEN: ${{ secrets.PICHUB_TOKEN }}
      SUPERBED_TOKEN: ${{ secrets.SUPERBED_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh markdown archive snapshots
        id: archive
        env:
          BEFORE_SHA: ${{ github.event.before || '0000000000000000000000000000000000000000' }}
          CURRENT_SHA: ${{ github.sha }}
        run: >
          python3 scripts/refresh_markdown_archives.py
          --repo-root .
          --before-sha "${BEFORE_SHA}"
          --current-sha "${CURRENT_SHA}"
          --manifest-path "${RUNNER_TEMP}/archive-refresh-manifest.json"

      - name: Generate CN mirror archive snapshots
        if: steps.archive.outputs.changed == 'true'
        run: >
          python3 scripts/mirror_archive_images.py
          --repo-root .
          --manifest-path "${{ steps.archive.outputs.manifest_path }}"
          --cache-path "archive/_image-mirror-map.json"

      - name: Commit and push archive snapshots
        if: steps.archive.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: refresh markdown archive snapshots"
          git push
