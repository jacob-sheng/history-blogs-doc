name: Refresh Markdown Archive Snapshots

on:
  push:
    branches:
      - main
    paths:
      - "*.md"
      - "**/*.md"

permissions:
  contents: write

jobs:
  refresh-markdown-archives:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh markdown archive snapshots
        id: archive
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          timestamp="$(TZ=Asia/Shanghai date +'%Y%m%d-%H%M%S')"
          zero_sha='0000000000000000000000000000000000000000'
          changed=0

          declare -a files=()
          declare -A seen_paths=()

          if [[ "${BEFORE_SHA}" == "${zero_sha}" ]]; then
            while IFS= read -r -d '' path; do
              files+=("${path}")
            done < <(git ls-tree -r -z --name-only HEAD -- ':(glob)*.md' ':(glob)**/*.md')
          else
            while IFS= read -r -d '' path; do
              files+=("${path}")
            done < <(git diff -z --name-only --diff-filter=AM "${BEFORE_SHA}" "${CURRENT_SHA}" -- ':(glob)*.md' ':(glob)**/*.md')
          fi

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          for path in "${files[@]}"; do
            if [[ -n "${seen_paths[${path}]:-}" ]]; then
              continue
            fi
            seen_paths["${path}"]=1

            if [[ "${path}" == archive/* ]]; then
              continue
            fi

            [[ -f "${path}" ]] || continue

            dir="$(dirname "${path}")"
            base="$(basename "${path}")"

            archive_dir="archive"
            if [[ "${dir}" != "." ]]; then
              archive_dir="archive/${dir}"
            fi

            mkdir -p "${archive_dir}"

            shopt -s nullglob
            for existing in "${archive_dir}"/*_"${base}"; do
              existing_name="$(basename "${existing}")"
              if [[ "${existing_name}" =~ ^[0-9]{8}-[0-9]{6}_.+\.md$ ]]; then
                rm -f "${existing}"
                changed=1
              fi
            done
            shopt -u nullglob

            candidate="${archive_dir}/${timestamp}_${base}"
            cp "${path}" "${candidate}"
            changed=1
          done

          if [[ "${changed}" -eq 1 ]]; then
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push archive snapshots
        if: steps.archive.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: refresh markdown archive snapshots"
          git push
