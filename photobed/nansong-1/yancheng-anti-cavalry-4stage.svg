  <g transform="translate(270,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">② 主动贴近</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#8B4513">步兵整体前压，压缩骑兵蓄速空间</text>

    <text x="100" y="58" text-anchor="middle" font-size="11" fill="#D62728">铁浮图</text>
    <circle cx="74" cy="96" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <circle cx="100" cy="96" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <circle cx="126" cy="96" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <line x1="100" y1="112" x2="100" y2="136" stroke="#D62728" stroke-width="4" marker-end="url(#arrow-red)"/>

    <circle cx="24" cy="106" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="176" cy="106" r="8" fill="#1F77B4" stroke="#000000"/>
    <path d="M24,106 C42,126 50,144 58,154" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow-blue)" opacity="0.75"/>
    <path d="M176,106 C158,126 150,144 142,154" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow-blue)" opacity="0.75"/>

    <polygon points="100,210 136,150 116,150 116,126 84,126 84,150 64,150" fill="#C69462" opacity="0.32"/>
    <text x="100" y="122" text-anchor="middle" font-size="10" fill="#8B4513">整体前压</text>
    <rect x="54" y="156" width="26" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="87" y="150" width="26" height="40" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="120" y="156" width="26" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <text x="67" y="177" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">左队</text>
    <text x="100" y="173" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">前锋</text>
    <text x="133" y="177" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">右队</text>
    <line x1="67" y1="156" x2="72" y2="132" stroke="#8B4513" stroke-width="2.8" marker-end="url(#arrow-brown)"/>
    <line x1="100" y1="150" x2="100" y2="124" stroke="#8B4513" stroke-width="3.3" marker-end="url(#arrow-brown)"/>
    <line x1="133" y1="156" x2="128" y2="132" stroke="#8B4513" stroke-width="2.8" marker-end="url(#arrow-brown)"/>

    <text x="100" y="280" text-anchor="middle" fill="#8B4513" font-size="12">抢在重骑冲透之前，先把距离吃掉</text>
  </g>

  <g transform="translate(520,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">③ 第斫马足</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#A05D2B">低头冲入马腹前沿，专攻马腿</text>

    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#A05D2B">“勿仰视，第斫马足”</text>
    <ellipse cx="66" cy="136" rx="16" ry="12" fill="#D62728" stroke="#000000" stroke-width="2" transform="rotate(-16 66 136)"/>
    <circle cx="100" cy="124" r="14" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <ellipse cx="134" cy="142" rx="16" ry="12" fill="#D62728" stroke="#000000" stroke-width="2" transform="rotate(18 134 142)"/>
    <circle cx="72" cy="86" r="11" fill="#D62728" opacity="0.35" stroke="#000000" stroke-width="1.5"/>
    <circle cx="100" cy="86" r="11" fill="#D62728" opacity="0.35" stroke="#000000" stroke-width="1.5"/>
    <circle cx="128" cy="86" r="11" fill="#D62728" opacity="0.35" stroke="#000000" stroke-width="1.5"/>
    <line x1="60" y1="96" x2="60" y2="116" stroke="#D62728" stroke-width="3"/>
    <line x1="140" y1="96" x2="140" y2="116" stroke="#D62728" stroke-width="3"/>

    <rect x="58" y="154" width="18" height="30" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="91" y="150" width="18" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="124" y="154" width="18" height="30" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <line x1="76" y1="156" x2="88" y2="136" stroke="#8B4513" stroke-width="3"/>
    <line x1="109" y1="150" x2="100" y2="134" stroke="#8B4513" stroke-width="3"/>
    <line x1="124" y1="156" x2="112" y2="136" stroke="#8B4513" stroke-width="3"/>
    <line x1="78" y1="150" x2="90" y2="140" stroke="#8B4513" stroke-width="2.2"/>
    <line x1="90" y1="150" x2="78" y2="140" stroke="#8B4513" stroke-width="2.2"/>
    <line x1="111" y1="146" x2="123" y2="136" stroke="#8B4513" stroke-width="2.2"/>
    <line x1="123" y1="146" x2="111" y2="136" stroke="#8B4513" stroke-width="2.2"/>
    <rect x="52" y="118" width="96" height="42" fill="url(#collapse-hatch)" opacity="0.45"/>
    <text x="100" y="196" text-anchor="middle" fill="#A05D2B" font-size="10">前列翻倒，后列拥堵</text>

    <text x="100" y="280" text-anchor="middle" fill="#A05D2B" font-size="12">麻札刀与大斧贴身上手，专砍马腿</text>
  </g>

  <g transform="translate(770,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">④ 手拽厮劈</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#D62728">贴身近战，重骑失机动，阵型瓦解</text>

    <ellipse cx="72" cy="126" rx="16" ry="12" fill="#D62728" stroke="#000000" stroke-width="2" transform="rotate(-24 72 126)"/>
    <ellipse cx="126" cy="132" rx="16" ry="12" fill="#D62728" stroke="#000000" stroke-width="2" transform="rotate(21 126 132)"/>
    <circle cx="100" cy="102" r="12" fill="#D62728" opacity="0.75" stroke="#000000" stroke-width="2"/>
    <line x1="62" y1="116" x2="82" y2="136" stroke="#000000" stroke-width="2"/>
    <line x1="82" y1="116" x2="62" y2="136" stroke="#000000" stroke-width="2"/>
    <line x1="116" y1="122" x2="136" y2="142" stroke="#000000" stroke-width="2"/>
    <line x1="136" y1="122" x2="116" y2="142" stroke="#000000" stroke-width="2"/>

    <rect x="44" y="148" width="22" height="32" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="76" y="136" width="22" height="36" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="108" y="146" width="22" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="140" y="156" width="22" height="30" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <line x1="54" y1="148" x2="72" y2="122" stroke="#8B4513" stroke-width="3"/>
    <line x1="87" y1="136" x2="100" y2="116" stroke="#8B4513" stroke-width="3"/>
    <line x1="119" y1="146" x2="108" y2="118" stroke="#8B4513" stroke-width="3"/>
    <line x1="151" y1="156" x2="134" y2="136" stroke="#8B4513" stroke-width="3"/>
    <line x1="82" y1="176" x2="98" y2="188" stroke="#000000" stroke-width="2.2"/>
    <line x1="98" y1="176" x2="82" y2="188" stroke="#000000" stroke-width="2.2"/>
    <line x1="112" y1="182" x2="126" y2="196" stroke="#000000" stroke-width="2.2"/>
    <line x1="126" y1="182" x2="112" y2="196" stroke="#000000" stroke-width="2.2"/>

    <circle cx="26" cy="96" r="8" fill="#1F77B4" opacity="0.35" stroke="#000000"/>
    <circle cx="174" cy="96" r="8" fill="#1F77B4" opacity="0.35" stroke="#000000"/>
    <text x="100" y="280" text-anchor="middle" fill="#D62728" font-size="12">马倒人翻后，岳家军贴身劈砍击溃中军</text>
  </g>

  <text x="500" y="330" text-anchor="middle" fill="#333333" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif" font-size="14">郾城四阶段破骑战术：主动前压 → 贴身入阵 → 专斫马足 → 近战击溃</text>
</svg>
