<svg width="1000" height="350" viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 5 2.5, 0 5" fill="#1F77B4"/>
    </marker>
    <marker id="arrow-red" markerWidth="6" markerHeight="6" refX="5.4" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 6 3, 0 6" fill="#D62728"/>
    </marker>
    <marker id="arrow-brown" markerWidth="5" markerHeight="5" refX="4.5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 5 2.5, 0 5" fill="#8B4513"/>
    </marker>
    <pattern id="collapse-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#A05D2B" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1000" height="350" fill="#F0F0F0"/>
  <line x1="250" y1="30" x2="250" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="500" y1="30" x2="500" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="750" y1="30" x2="750" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(20,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">① 铁浮图压进</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#D62728">中路重骑前推，两翼拐子马外张</text>

    <text x="100" y="62" text-anchor="middle" font-size="11" fill="#D62728">铁浮图</text>
    <circle cx="72" cy="92" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <circle cx="100" cy="92" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <circle cx="128" cy="92" r="13" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <line x1="100" y1="108" x2="100" y2="138" stroke="#D62728" stroke-width="4.5" marker-end="url(#arrow-red)"/>

    <circle cx="28" cy="112" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="172" cy="112" r="8" fill="#1F77B4" stroke="#000000"/>
    <path d="M28,112 C40,132 46,148 56,164" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M172,112 C160,132 154,148 144,164" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" fill="none" marker-end="url(#arrow-blue)"/>
    <text x="28" y="96" text-anchor="middle" font-size="9" fill="#1F77B4">拐</text>
    <text x="172" y="96" text-anchor="middle" font-size="9" fill="#1F77B4">拐</text>

    <text x="100" y="150" text-anchor="middle" font-size="11" fill="#5A3A1E">岳家军步兵前锋</text>
    <rect x="55" y="174" width="24" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="88" y="174" width="24" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="121" y="174" width="24" height="34" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <text x="67" y="195" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">左队</text>
    <text x="100" y="195" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">中队</text>
    <text x="133" y="195" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">右队</text>
    <line x1="67" y1="174" x2="74" y2="146" stroke="#8B4513" stroke-width="2.6" marker-end="url(#arrow-brown)"/>
    <line x1="100" y1="174" x2="100" y2="142" stroke="#8B4513" stroke-width="2.6" marker-end="url(#arrow-brown)"/>
    <line x1="133" y1="174" x2="126" y2="146" stroke="#8B4513" stroke-width="2.6" marker-end="url(#arrow-brown)"/>

    <text x="100" y="280" text-anchor="middle" fill="#5A3A1E" font-size="12">不结死阵，前锋主动迎上铁浮图</text>
