<svg width="1000" height="350" viewBox="0 0 1000 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#1F77B4"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#D62728"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#A05D2B" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1000" height="350" fill="#F0F0F0"/>
  <line x1="250" y1="30" x2="250" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="500" y1="30" x2="500" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="750" y1="30" x2="750" y2="300" stroke="#999999" stroke-width="1" stroke-dasharray="3 3"/>

  <g transform="translate(20,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">① 外围游射骚扰</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#1F77B4">轻骑两翼游走，持续抛射</text>

    <text x="100" y="132" text-anchor="middle" font-size="11" fill="#5A3A1E">宋军步兵方阵</text>
    <rect x="50" y="150" width="30" height="36" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="85" y="150" width="30" height="36" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="120" y="150" width="30" height="36" fill="#8B4513" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <text x="65" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">左翼</text>
    <text x="100" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">中军</text>
    <text x="135" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">右翼</text>
    <rect x="78" y="206" width="44" height="18" fill="#D7C4A8" stroke="#8B6B47" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="218" text-anchor="middle" fill="#6B4A28" font-size="9">粮道</text>

    <circle cx="30" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="170" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="30" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="170" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <line x1="30" y1="100" x2="55" y2="150" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="170" y1="100" x2="145" y2="150" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="30" y1="220" x2="78" y2="212" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="170" y1="220" x2="122" y2="212" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <text x="100" y="280" text-anchor="middle" fill="#1F77B4" font-size="12">轻骑兵游射并试探粮道</text>
  </g>

  <g transform="translate(270,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">② 被动消耗</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#A05D2B">宋军结阵不动，体能持续下降</text>

    <rect x="50" y="150" width="30" height="36" fill="#B87C4B" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="85" y="150" width="30" height="36" fill="#B87C4B" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="120" y="150" width="30" height="36" fill="#B87C4B" stroke="#5A3A1E" stroke-width="2" rx="3"/>
    <rect x="50" y="150" width="100" height="36" fill="url(#hatch)" opacity="0.35"/>
    <text x="65" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">左翼</text>
    <text x="100" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">中军</text>
    <text x="135" y="172" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="700">右翼</text>
    <rect x="78" y="206" width="44" height="18" fill="#D7C4A8" stroke="#8B6B47" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="218" text-anchor="middle" fill="#6B4A28" font-size="9">粮道</text>

    <circle cx="30" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="170" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="30" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="170" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="100" cy="40" r="8" fill="#1F77B4" stroke="#000000"/>
    <line x1="30" y1="100" x2="55" y2="150" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="170" y1="100" x2="145" y2="150" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="30" y1="220" x2="78" y2="212" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="170" y1="220" x2="122" y2="212" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <line x1="100" y1="40" x2="100" y2="150" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)"/>
    <text x="100" y="280" text-anchor="middle" fill="#A05D2B" font-size="12">体力下降，方阵硬撑不动</text>
  </g>

  <g transform="translate(520,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">③ 阵型松动</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#FF8C00">持续消耗后，步兵方阵开始散开</text>

    <rect x="56" y="152" width="24" height="34" fill="#B87C4B" stroke="#5A3A1E" stroke-width="1.5" rx="3"/>
    <rect x="92" y="156" width="26" height="28" fill="#B87C4B" stroke="#5A3A1E" stroke-width="1.5" rx="3"/>
    <rect x="128" y="148" width="24" height="36" fill="#B87C4B" stroke="#5A3A1E" stroke-width="1.5" rx="3"/>
    <text x="68" y="173" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">左部</text>
    <text x="105" y="173" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">中部</text>
    <text x="140" y="171" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">右部</text>
    <line x1="80" y1="190" x2="90" y2="200" stroke="#000000" stroke-width="1.5"/>
    <line x1="90" y1="190" x2="80" y2="200" stroke="#000000" stroke-width="1.5"/>
    <line x1="140" y1="186" x2="150" y2="196" stroke="#000000" stroke-width="1.5"/>
    <line x1="150" y1="186" x2="140" y2="196" stroke="#000000" stroke-width="1.5"/>
    <rect x="82" y="206" width="36" height="18" fill="#D7C4A8" stroke="#8B6B47" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="100" y="218" text-anchor="middle" fill="#6B4A28" font-size="9">粮道</text>

    <circle cx="20" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="180" cy="100" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="20" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="180" cy="220" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="50" cy="50" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="150" cy="50" r="8" fill="#1F77B4" stroke="#000000"/>
    <line x1="20" y1="100" x2="58" y2="158" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)" opacity="0.6"/>
    <line x1="180" y1="100" x2="146" y2="156" stroke="#1F77B4" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrow-blue)" opacity="0.6"/>
    <text x="100" y="280" text-anchor="middle" fill="#FF8C00" font-size="12">阵型散乱，裂缝出现</text>
  </g>

  <g transform="translate(770,20)" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif">
    <text x="100" y="20" text-anchor="middle" font-size="16" font-weight="700">④ 重骑收割</text>
    <text x="100" y="38" text-anchor="middle" font-size="11" fill="#D62728">重骑沿裂缝突入，轻骑两侧合围</text>

    <circle cx="100" cy="60" r="15" fill="#D62728" stroke="#000000" stroke-width="2"/>
    <text x="100" y="65" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">重骑</text>
    <line x1="100" y1="78" x2="100" y2="140" stroke="#D62728" stroke-width="5" marker-end="url(#arrow-red)"/>

    <rect x="58" y="154" width="18" height="30" fill="#B87C4B" stroke="#000000" stroke-width="1" rx="2" transform="rotate(-5,67,169)"/>
    <rect x="93" y="162" width="24" height="18" fill="#B87C4B" stroke="#000000" stroke-width="1" rx="2" transform="rotate(10,105,171)"/>
    <rect x="126" y="146" width="18" height="34" fill="#B87C4B" stroke="#000000" stroke-width="1" rx="2" transform="rotate(-8,135,163)"/>
    <line x1="62" y1="164" x2="72" y2="174" stroke="#000000" stroke-width="2"/>
    <line x1="72" y1="164" x2="62" y2="174" stroke="#000000" stroke-width="2"/>
    <line x1="102" y1="174" x2="112" y2="184" stroke="#000000" stroke-width="2"/>
    <line x1="112" y1="174" x2="102" y2="184" stroke="#000000" stroke-width="2"/>
    <line x1="134" y1="156" x2="144" y2="166" stroke="#000000" stroke-width="2"/>
    <line x1="144" y1="156" x2="134" y2="166" stroke="#000000" stroke-width="2"/>
    <circle cx="50" cy="180" r="8" fill="#1F77B4" stroke="#000000"/>
    <circle cx="150" cy="200" r="8" fill="#1F77B4" stroke="#000000"/>
    <text x="100" y="280" text-anchor="middle" fill="#D62728" font-size="12">重骑冲锋，方阵崩溃</text>
  </g>

  <text x="500" y="330" text-anchor="middle" fill="#333333" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',sans-serif" font-size="14">金军轻重骑兵四阶段战术：游射骚扰 → 被动消耗 → 阵型松动 → 冲锋收割</text>
</svg>
